<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>N→16 — ネガ現像</title>
<meta name="robots" content="noindex, nofollow">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#F5EDDA">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="N→16">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{--bg:#F5EDDA;--panel:#FCF6E8;--panel2:#EFE4CB;--ink:#2B2620;--line:#8A7B63;
    --txt:#2B2620;--muted:#847356;--accent:#A63D2F;--accent2:#3F5E7A;--gold:#B8912E;
    --serif:Georgia,"Times New Roman","Hiragino Mincho ProN",serif}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",Roboto,sans-serif;overscroll-behavior:none}
  header{padding:13px 16px;display:flex;align-items:center;gap:10px;
    border-bottom:3px double var(--ink);position:sticky;top:0;background:var(--bg);z-index:10}
  header .logo{font-family:var(--serif);font-weight:700;font-size:20px;letter-spacing:.5px;cursor:pointer}
  header .logo b{color:var(--accent)}
  header .logo .arrow{display:inline-block;transform:translateY(-1px);color:var(--accent2)}
  header .step{font-size:11px;font-weight:700;color:var(--panel);margin-left:auto;font-family:var(--serif);
    background:var(--accent);border-radius:3px;padding:6px 12px;letter-spacing:1px}
  main{max-width:720px;margin:0 auto;padding:14px}
  .stage{position:sticky;top:60px;z-index:5;background:#211C15;border-radius:6px;overflow:hidden;
    border:1px solid var(--ink);box-shadow:0 1px 0 var(--line),0 4px 14px rgba(43,38,32,.18);
    aspect-ratio:3/4;max-height:30vh;display:flex;align-items:center;justify-content:center;touch-action:none}
  .stage.compact{aspect-ratio:auto;height:44vh;max-height:none}
  .stage canvas,.stage video{max-width:100%;max-height:100%;display:block}
  #cropCanvas,#devCanvas{width:100%;height:100%;object-fit:contain}
  .hint{position:absolute;inset:0;display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;color:#B9A987;
    font-size:14px;font-weight:600;text-align:center;padding:22px;pointer-events:none}
  .row{display:flex;gap:9px;margin-top:13px;flex-wrap:wrap}
  button{flex:1;min-width:96px;border:1.5px solid var(--ink);background:var(--panel);color:var(--ink);
    padding:12px 8px;border-radius:6px;font-size:14px;font-weight:700;font-family:var(--serif);cursor:pointer;
    box-shadow:inset 0 0 0 2px var(--panel),inset 0 0 0 3px var(--line),0 2px 5px rgba(43,38,32,.15);
    transition:transform .08s,box-shadow .08s}
  button:active{transform:translateY(1px);box-shadow:inset 0 0 0 2px var(--panel),inset 0 0 0 3px var(--line)}
  button.primary{background:var(--accent);color:#F9F2E2;
    box-shadow:inset 0 0 0 2px var(--accent),inset 0 0 0 3px rgba(249,242,226,.55),0 2px 5px rgba(43,38,32,.2)}
  button.ghost{background:var(--panel2);
    box-shadow:inset 0 0 0 2px var(--panel2),inset 0 0 0 3px var(--line),0 2px 5px rgba(43,38,32,.12)}
  button:disabled{opacity:.35}
  .seg{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .seg button{padding:9px 6px;font-size:13px;min-width:0}
  .seg button.on{background:var(--accent2);color:#F9F2E2;
    box-shadow:inset 0 0 0 2px var(--accent2),inset 0 0 0 3px rgba(249,242,226,.55)}
  .panel{margin-top:16px;background:var(--panel);border:1px solid var(--ink);border-radius:6px;padding:15px;
    box-shadow:inset 0 0 0 3px var(--panel),inset 0 0 0 4px var(--line),0 2px 8px rgba(43,38,32,.12)}
  .panel h3{margin:0 0 12px;font-size:13px;color:var(--accent);font-weight:700;letter-spacing:2px;
    font-family:var(--serif);text-transform:uppercase;text-align:center;position:relative}
  .panel h3::before,.panel h3::after{content:"";position:absolute;top:50%;width:18%;border-top:1px solid var(--line)}
  .panel h3::before{left:0}.panel h3::after{right:0}
  .ctl{margin-bottom:12px}
  .ctl label{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:5px}
  .ctl label b{color:var(--accent2);font-family:var(--serif);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:var(--accent)}
  .tabs{display:flex;gap:7px;margin-bottom:10px}
  .tabs button{padding:8px;font-size:13px}
  .tabs button.on{background:var(--gold);color:#F9F2E2;
    box-shadow:inset 0 0 0 2px var(--gold),inset 0 0 0 3px rgba(249,242,226,.55)}
  .toggle{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:700;margin-bottom:10px}
  .switch{width:48px;height:28px;border-radius:15px;background:var(--panel2);border:1.5px solid var(--ink);position:relative;transition:.15s;flex:0 0 auto}
  .switch.on{background:var(--accent2)}
  .switch i{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#FCF6E8;border:1.5px solid var(--ink);transition:.15s}
  .switch.on i{left:23px}
  .foot{color:var(--muted);font-size:12px;font-weight:600;margin:15px 4px;line-height:1.8}
  #hero{display:flex;align-items:center;justify-content:center;padding:44px 10px 16px}
  .tips{margin-top:14px;padding:10px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:6px}
  .tips summary{font-size:13px;font-weight:700;font-family:var(--serif);cursor:pointer;color:var(--muted)}
  .hidden{display:none!important}
  .badge{position:absolute;top:10px;left:10px;background:var(--gold);color:#F9F2E2;font-size:11px;
    font-weight:700;font-family:var(--serif);padding:5px 11px;border-radius:3px;letter-spacing:.5px}
</style>
</head>
<body>
<header>
  <div class="logo">N<span class="arrow">→</span><b>16</b> <span style="font-size:13px">🎞</span> <span style="font-size:9px;color:var(--muted);font-weight:600">v28</span></div>
  <div class="step" id="stepLabel">① 読み込み</div>
</header>

<main>
  <div id="hero">
    <svg viewBox="0 0 380 130" style="width:72%;max-width:320px" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cmy" gradientUnits="userSpaceOnUse" x1="208" y1="20" x2="372" y2="110">
          <stop offset="0" stop-color="#00AEEF"/><stop offset=".5" stop-color="#EC008C"/><stop offset="1" stop-color="#FFDE17"/>
        </linearGradient>
      </defs>
      <g fill="#2B2620">
        <line x1="6" y1="65" x2="182" y2="65" stroke="#2B2620" stroke-width="3.2"/>
        <polygon points="200,65 167,53.5 175,65 167,76.5"/>
        <circle cx="20" cy="13" r="5.5"/><circle cx="20" cy="39" r="5.5"/><circle cx="20" cy="65" r="5.5"/><circle cx="20" cy="91" r="5.5"/><circle cx="20" cy="117" r="5.5"/>
        <circle cx="125" cy="13" r="5.5"/><circle cx="125" cy="39" r="5.5"/><circle cx="125" cy="65" r="5.5"/><circle cx="125" cy="91" r="5.5"/><circle cx="125" cy="117" r="5.5"/>
        <circle cx="46.3" cy="39" r="5.5"/><circle cx="72.5" cy="65" r="5.5"/><circle cx="98.8" cy="91" r="5.5"/>
      </g>
      <text x="208" y="116" font-family="Georgia,'Times New Roman',serif" font-size="138" fill="url(#cmy)">16</text>
    </svg>
  </div>
  <div class="stage hidden" id="stage">
    <canvas id="cropCanvas" class="hidden"></canvas>
    <canvas id="devCanvas" class="hidden"></canvas>
    <div class="hint" id="hint">ネガを撮影 または 写真を選ぶ</div>
    <div class="badge hidden" id="badge"></div>
  </div>

  <div id="uiLoad">
    <div class="row">
      <button id="btnCam" class="primary">📷 ネガを撮る</button>
      <button id="btnFile">🖼 ネガを選ぶ</button>
    </div>
    <div class="panel" style="margin-top:14px">
      <h3>セットアップ</h3>
      <svg viewBox="0 0 380 232" style="width:100%;display:block" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Hiragino Sans',sans-serif">
        <!-- スマホ -->
        <rect x="100" y="10" width="80" height="26" rx="7" fill="#2B2620"/>
        <circle cx="140" cy="36" r="4" fill="#B8912E"/>
        <text x="232" y="29" font-size="11" font-weight="700" fill="#2B2620">スマホ</text>
        <!-- 光軸 -->
        <line x1="140" y1="42" x2="140" y2="150" stroke="#847356" stroke-width="1.5" stroke-dasharray="4 4"/>
        <!-- 黒い紙 -->
        <rect x="66" y="64" width="60" height="8" rx="2" fill="#2B2620"/>
        <rect x="154" y="64" width="60" height="8" rx="2" fill="#2B2620"/>
        <text x="232" y="73" font-size="10" font-weight="700" fill="#2B2620">黒い紙<tspan font-size="9" fill="#847356">（レンズ穴＝映り込み防止）</tspan></text>
        <!-- フィルム -->
        <rect x="78" y="98" width="124" height="20" rx="3" fill="#A63D2F"/>
        <g fill="#F5EDDA">
          <rect x="84" y="101" width="5" height="4" rx="1"/><rect x="96" y="101" width="5" height="4" rx="1"/><rect x="108" y="101" width="5" height="4" rx="1"/><rect x="120" y="101" width="5" height="4" rx="1"/><rect x="132" y="101" width="5" height="4" rx="1"/><rect x="144" y="101" width="5" height="4" rx="1"/><rect x="156" y="101" width="5" height="4" rx="1"/><rect x="168" y="101" width="5" height="4" rx="1"/><rect x="180" y="101" width="5" height="4" rx="1"/><rect x="192" y="101" width="5" height="4" rx="1"/>
          <rect x="84" y="111" width="5" height="4" rx="1"/><rect x="96" y="111" width="5" height="4" rx="1"/><rect x="108" y="111" width="5" height="4" rx="1"/><rect x="120" y="111" width="5" height="4" rx="1"/><rect x="132" y="111" width="5" height="4" rx="1"/><rect x="144" y="111" width="5" height="4" rx="1"/><rect x="156" y="111" width="5" height="4" rx="1"/><rect x="168" y="111" width="5" height="4" rx="1"/><rect x="180" y="111" width="5" height="4" rx="1"/><rect x="192" y="111" width="5" height="4" rx="1"/>
        </g>
        <text x="232" y="112" font-size="11" font-weight="700" fill="#2B2620">フィルム</text>
        <!-- ガラス＋スペーサー -->
        <rect x="66" y="126" width="148" height="7" rx="2" fill="#3F5E7A" opacity=".35"/>
        <rect x="72" y="133" width="10" height="18" fill="#8A7B63"/>
        <rect x="198" y="133" width="10" height="18" fill="#8A7B63"/>
        <text x="232" y="136" font-size="10" font-weight="700" fill="#2B2620">ガラスで浮かす<tspan font-size="9" fill="#847356">（2〜3cm）</tspan></text>
        <text x="232" y="148" font-size="9" fill="#847356">→ 画面のモアレが消える</text>
        <!-- 光源 -->
        <rect x="56" y="158" width="168" height="30" rx="4" fill="#B8912E" opacity=".85"/>
        <rect x="64" y="164" width="152" height="18" rx="2" fill="#FCF6E8"/>
        <g stroke="#B8912E" stroke-width="1.5">
          <line x1="100" y1="156" x2="100" y2="148"/><line x1="140" y1="156" x2="140" y2="148"/><line x1="180" y1="156" x2="180" y2="148"/>
        </g>
        <text x="232" y="176" font-size="11" font-weight="700" fill="#2B2620">光源</text>
        <text x="232" y="188" font-size="9" fill="#847356">PC白画面 / トレース台</text>
        <text x="20" y="222" font-size="10" fill="#847356">🔒 すべて端末内で処理。画像は外部に送信されません</text>
      </svg>
    </div>
    <input id="fileInput" type="file" accept="image/*" class="hidden">
    <input id="capInput" type="file" accept="image/*" capture="environment" class="hidden">
  </div>

  <div id="uiCrop" class="hidden">
    <div class="panel">
      <h3>フィルムフォーマット</h3>
      <div class="seg" id="segFormat">
        <button data-f="half" data-r="0.75">ハーフ</button>
        <button data-f="35" data-r="1.5" class="on">35mm</button>
        <button data-f="66" data-r="1">6×6</button>
        <button data-f="67" data-r="0.857">6×7</button>
        <button data-f="free" data-r="0">FREE</button>
      </div>
      <div class="seg" id="segOrient">
        <button data-o="land" class="on">横</button>
        <button data-o="port">縦</button>
      </div>
      <div class="row" style="margin-top:0">
        <button id="btnRotL" class="ghost">↺</button>
        <button id="btnRotR" class="ghost">↻</button>
        <button id="btnAutoCrop" class="primary">✨ 自動</button>
      </div>
      <div class="ctl" style="margin-top:12px">
        <label><span>傾き</span><b id="vTilt">0.0°</b></label>
        <input type="range" id="tiltR" min="-50" max="50" value="0">
      </div>
      <div class="row" style="margin-top:0">
        <button id="btnPickBase" class="ghost">🎯 ベース指定</button>
      </div>
      <div class="toggle" style="margin-top:12px">
        <span>ポジ表示</span>
        <div class="switch on" id="tgPreview"><i></i></div>
      </div>
    </div>
    <div class="row">
      <button id="btnBackLoad" class="ghost">← 戻る</button>
      <button id="btnToDev" class="primary">現像へ →</button>
    </div>
  </div>

  <div id="uiDev" class="hidden">
    <div class="panel">
      <h3>フィルムタイプ</h3>
      <div class="seg" id="segType">
        <button data-t="color" class="on">カラーネガ</button>
        <button data-t="bw">モノクロ</button>
        <button data-t="slide">ポジ</button>
      </div>
    </div>

    <div class="panel">
      <h3>カラーバランス</h3>

        <button data-z="mid">中間</button>
        <button data-z="hi">ハイライト</button>
      </div>
      <div class="ctl"><label><span>シアン ↔ レッド</span><b id="vCR">0</b></label><input type="range" id="cbCR" min="-100" max="100" value="0"></div>
      <div class="ctl"><label><span>マゼンタ ↔ グリーン</span><b id="vMG">0</b></label><input type="range" id="cbMG" min="-100" max="100" value="0"></div>
      <div class="ctl"><label><span>イエロー ↔ ブルー</span><b id="vYB">0</b></label><input type="range" id="cbYB" min="-100" max="100" value="0"></div>
    </div>

    <div class="panel">
      <h3>トーン</h3>
      <div class="ctl"><label><span>シャドウ</span><b id="vTSh">0</b></label><input type="range" id="tSh" min="-100" max="100" value="0"></div>
      <div class="ctl"><label><span>中間</span><b id="vTMid">0</b></label><input type="range" id="tMid" min="-100" max="100" value="0"></div>
      <div class="ctl"><label><span>ハイライト</span><b id="vTHi">0</b></label><input type="range" id="tHi" min="-100" max="100" value="0"></div>
    </div>

    <div class="panel">
      <h3>基本</h3>
      <div class="toggle"><span>ざらつき軽減</span><div class="switch" id="tgNR"><i></i></div></div>
      <div class="ctl"><label><span>露出</span><b id="vExp">0</b></label><input type="range" id="exp" min="-100" max="100" value="0"></div>
      <div class="ctl"><label><span>コントラスト</span><b id="vCon">0</b></label><input type="range" id="con" min="-100" max="100" value="0"></div>
      <div class="ctl"><label><span>彩度</span><b id="vSat">0</b></label><input type="range" id="sat" min="-100" max="100" value="0"></div>
      <div class="ctl"><label><span>シャープ</span><b id="vShp">0</b></label><input type="range" id="shp" min="0" max="100" value="0"></div>
    </div>

    <div class="row">
      <button id="btnAutoLv" class="primary">✨ 自動補正</button>
      <button id="btnResetDev" class="ghost">リセット</button>
    </div>
    <div class="row">
      <button id="btnBackCrop" class="ghost">← トリミング</button>
      <button id="btnSave" class="primary">⬇ 保存</button>
    </div>
    <div class="row">
      <button id="btnNext" class="ghost">📸 次を撮影</button>
      <button id="btnNextFile" class="ghost">🖼 次を選ぶ</button>
    </div>
  </div>

</main>

<script>
const $=s=>document.querySelector(s);
const stage=$('#stage');
const cropCv=$('#cropCanvas'),cctx=cropCv.getContext('2d',{willReadFrequently:true});
const devCv=$('#devCanvas'),dctx=devCv.getContext('2d',{willReadFrequently:true});
const hint=$('#hint'),badge=$('#badge');
let srcCv=document.createElement('canvas');
let sctx=srcCv.getContext('2d',{willReadFrequently:true});
let viewCv=document.createElement('canvas');                       // トリミング画面用の縮小プレビュー（キャッシュ）
let vctx=viewCv.getContext('2d',{willReadFrequently:true});
let kView=1,pickMode=false,baseLocked=false,lut=null,tilt=0,nr=false;
let origImg=null,origRot=0;   // 元画像（原寸）を保持し、切り出しは原寸から＝縮小損失ゼロ
let crop={x:0,y:0,w:0,h:0};
let format='35',aspect=1.5,orient='land',previewPos=true;
let baseColor={r:210,g:130,b:70};

$('#btnFile').onclick=()=>$('#fileInput').click();
$('#btnCam').onclick=()=>$('#capInput').click();                   // ネイティブカメラ起動＝フル解像度写真
let origURL=null;
const onPick=e=>{const f=e.target.files[0];if(!f)return;
  const img=new Image();
  img.onload=()=>{
    if(origURL)URL.revokeObjectURL(origURL);   // 前の画像のURLだけ解放。使用中のURLは保持（iOSの再デコード対策）
    origURL=img.src;
    setSource(img,img.naturalWidth,img.naturalHeight);e.target.value='';};
  img.src=URL.createObjectURL(f);};
$('#fileInput').onchange=onPick;
$('#capInput').onchange=onPick;
function resetCamUI(){                                              // 読み込み画面の表示状態を初期化
  $('#fileInput').value='';$('#capInput').value='';               // 同じ写真の再選択でもchangeが発火するように
  const onLoad=!$('#uiLoad').classList.contains('hidden');
  stage.classList.toggle('hidden',onLoad);$('#hero').classList.toggle('hidden',!onLoad);  // 読み込み画面ではロゴ、他はステージ
}

function setSource(src,w,h){
  const max=4096,sc=Math.min(1,max/Math.max(w,h));                 // 3000→4096（12MP写真をほぼ維持）
  srcCv.width=Math.round(w*sc);srcCv.height=Math.round(h*sc);
  sctx.imageSmoothingEnabled=true;sctx.imageSmoothingQuality='high';
  sctx.drawImage(src,0,0,srcCv.width,srcCv.height);
  origImg=(src instanceof HTMLImageElement)?src:null;origRot=0;   // 写真読み込み時は原寸を保持（ライブ撮影は不可）
  tilt=0;$('#tiltR').value=0;$('#vTilt').textContent='0.0°';
  baseLocked=false;baseColor=estimateBase();makeLUT();buildView();
  goStage('crop');autoCrop();
}

function rotate(dir){
  const w=srcCv.height,h=srcCv.width;
  const t=document.createElement('canvas');t.width=w;t.height=h;
  const tx=t.getContext('2d',{willReadFrequently:true});
  tx.translate(w/2,h/2);tx.rotate(dir*Math.PI/2);tx.drawImage(srcCv,-srcCv.width/2,-srcCv.height/2);
  srcCv=t;sctx=tx;origRot=(origRot+dir+4)%4;buildView();autoCrop();
}
$('#btnRotL').onclick=()=>rotate(-1);
$('#btnRotR').onclick=()=>rotate(1);

/* ベース推定：明度の中位〜上位帯（真っ白な光源と暗い背景を除外）の中央値を取る */
function pickBaseFrom(S){
  if(S.length<40)return null;
  S.sort((a,b)=>a[3]-b[3]);
  const sub=S.slice(Math.floor(S.length*0.55),Math.ceil(S.length*0.92));
  if(sub.length<10)return null;
  const med=c=>{const a=sub.map(p=>p[c]).sort((m,n)=>m-n);return a[a.length>>1];};
  return{r:med(0),g:med(1),b:med(2)};
}
function estimateBase(){
  const W=srcCv.width,H=srcCv.height,s=Math.max(4,Math.floor(Math.min(W,H)*0.05)),S=[];
  const grab=(x,y,w,h)=>{if(w<1||h<1)return;const d=sctx.getImageData(x,y,w,h).data;
    for(let i=0;i<d.length;i+=16)S.push([d[i],d[i+1],d[i+2],d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114]);};
  grab(0,0,W,s);grab(0,H-s,W,s);grab(0,s,s,H-2*s);grab(W-s,s,s,H-2*s);
  return pickBaseFrom(S)||{r:210,g:130,b:70};
}
/* トリミング枠のすぐ外側（コマ間・未露光のフィルム地）から再推定：外周より確実 */
function estimateBaseRing(){
  const W=srcCv.width,H=srcCv.height;
  const m=Math.max(8,Math.min(crop.w,crop.h)*0.07),S=[];
  const x0=Math.max(0,crop.x-m),y0=Math.max(0,crop.y-m);
  const x1=Math.min(W,crop.x+crop.w+m),y1=Math.min(H,crop.y+crop.h+m);
  const grab=(x,y,w,h)=>{x=Math.round(x);y=Math.round(y);w=Math.round(w);h=Math.round(h);
    if(w<2||h<2)return;const d=sctx.getImageData(x,y,w,h).data;
    for(let i=0;i<d.length;i+=8)S.push([d[i],d[i+1],d[i+2],d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114]);};
  grab(x0,y0,x1-x0,crop.y-y0);
  grab(x0,crop.y+crop.h,x1-x0,y1-crop.y-crop.h);
  grab(x0,crop.y,crop.x-x0,crop.h);
  grab(crop.x+crop.w,crop.y,x1-crop.x-crop.w,crop.h);
  return pickBaseFrom(S);
}
/* 手動ベース指定：タップ地点の9×9中央値（傾き分を逆回転して元画像座標へ） */
function pickBaseAt(x,y){
  const W=srcCv.width,H=srcCv.height,a=-tilt*Math.PI/180;
  const dx=x-W/2,dy=y-H/2;
  x=W/2+dx*Math.cos(a)-dy*Math.sin(a);y=H/2+dx*Math.sin(a)+dy*Math.cos(a);
  const r=4,x0=clamp(Math.round(x)-r,0,srcCv.width-2*r-1),y0=clamp(Math.round(y)-r,0,srcCv.height-2*r-1);
  const d=sctx.getImageData(x0,y0,2*r+1,2*r+1).data,ch=[[],[],[]];
  for(let i=0;i<d.length;i+=4){ch[0].push(d[i]);ch[1].push(d[i+1]);ch[2].push(d[i+2]);}
  const med=a=>{a.sort((m,n)=>m-n);return a[a.length>>1];};
  baseColor={r:med(ch[0]),g:med(ch[1]),b:med(ch[2])};baseLocked=true;
  makeLUT();buildView();drawCrop();flash('ベース設定 ✓');
}

function curAspect(){
  if(format==='free'||aspect===0)return crop.w/crop.h;
  return orient==='port'?(1/aspect):aspect;
}
function applyAspectToCrop(){
  if(format==='free')return;
  const a=curAspect(),cx=crop.x+crop.w/2,cy=crop.y+crop.h/2;
  let w=crop.w,h=w/a;
  if(h>srcCv.height){h=srcCv.height;w=h*a;}
  if(w>srcCv.width){w=srcCv.width;h=w/a;}
  crop.w=w;crop.h=h;crop.x=clamp(cx-w/2,0,srcCv.width-w);crop.y=clamp(cy-h/2,0,srcCv.height-h);
}

function autoCrop(){
  const W=srcCv.width,H=srcCv.height,sw=Math.min(240,W),sc=sw/W,sh=Math.round(H*sc);
  const t=document.createElement('canvas');t.width=sw;t.height=sh;
  const tx=t.getContext('2d',{willReadFrequently:true});
  tx.translate(sw/2,sh/2);tx.rotate(tilt*Math.PI/180);tx.translate(-sw/2,-sh/2);  // 傾きを反映して検出
  tx.drawImage(srcCv,0,0,sw,sh);
  const d=tx.getImageData(0,0,sw,sh).data;
  const lum=new Float32Array(sw*sh);let mx=0;
  for(let i=0,j=0;i<d.length;i+=4,j++){const L=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];lum[j]=L;if(L>mx)mx=L;}
  const th=mx*0.62;                                   // コマ＝均一に明るい部分だけ拾う
  const colF=new Float32Array(sw),rowF=new Float32Array(sh);
  for(let y=0;y<sh;y++)for(let x=0;x<sw;x++){if(lum[y*sw+x]>th){colF[x]++;rowF[y]++;}}
  const span=(arr,len,perp)=>{const need=perp*0.5;let a=0,b=len-1;   // 送り穴帯は明部比率が低く除外されやすい
    while(a<len&&arr[a]<need)a++;while(b>a&&arr[b]<need)b--;return[a,b];};
  let cx=span(colF,sw,sh),cy=span(rowF,sh,sw);
  let cx0=cx[0],cx1=cx[1],cy0=cy[0],cy1=cy[1];
  if(cx1-cx0<sw*0.15||cy1-cy0<sh*0.15){cx0=sw*0.1;cx1=sw*0.9;cy0=sh*0.1;cy1=sh*0.9;}
  let bx=cx0/sc,by=cy0/sc,bw=(cx1-cx0)/sc,bh=(cy1-cy0)/sc;
  const ix=bw*0.03,iy=bh*0.03;bx+=ix;by+=iy;bw-=ix*2;bh-=iy*2; // 少し内側＝送り穴を除外
  if(format==='free'){crop.x=bx;crop.y=by;crop.w=bw;crop.h=bh;}
  else{const a=curAspect();let w=bw,h=w/a;if(h>bh){h=bh;w=h*a;}   // アスペクトを検出枠の内側にフィット（外に広げない）
    crop.w=w;crop.h=h;crop.x=bx+(bw-w)/2;crop.y=by+(bh-h)/2;}
  drawCrop();flash('自動トリミング');
}

/* 縮小プレビューを一度だけ作ってキャッシュ（ドラッグ中に毎回フル変換しない） */
function buildView(){
  const W=srcCv.width,H=srcCv.height;
  kView=Math.min(1,1500/Math.max(W,H));
  const w=Math.max(1,Math.round(W*kView)),h=Math.max(1,Math.round(H*kView));
  viewCv.width=w;viewCv.height=h;
  vctx.imageSmoothingEnabled=true;vctx.imageSmoothingQuality='high';
  vctx.save();
  vctx.translate(w/2,h/2);vctx.rotate(tilt*Math.PI/180);vctx.scale(kView,kView);
  vctx.drawImage(srcCv,-srcCv.width/2,-srcCv.height/2);
  vctx.restore();
  if(previewPos){vctx.putImageData(convert(vctx.getImageData(0,0,w,h)),0,0);}
}
function drawCrop(){
  const w=viewCv.width,h=viewCv.height,k=kView;
  cropCv.width=w;cropCv.height=h;
  cctx.drawImage(viewCv,0,0);
  const cx=crop.x*k,cy=crop.y*k,cw=crop.w*k,ch=crop.h*k;
  cctx.fillStyle='rgba(0,0,0,.55)';
  cctx.fillRect(0,0,w,cy);cctx.fillRect(0,cy+ch,w,h-cy-ch);
  cctx.fillRect(0,cy,cx,ch);cctx.fillRect(cx+cw,cy,w-cx-cw,ch);
  cctx.strokeStyle='#A63D2F';cctx.lineWidth=Math.max(2,w*0.004);cctx.strokeRect(cx,cy,cw,ch);
  const hs=Math.max(10,w*0.022);cctx.fillStyle='#A63D2F';
  const H4=[[cx,cy],[cx+cw,cy],[cx,cy+ch],[cx+cw,cy+ch]];
  if(format==='free')H4.push([cx+cw/2,cy],[cx+cw/2,cy+ch],[cx,cy+ch/2],[cx+cw,cy+ch/2]);  // FREEは辺ハンドルも
  H4.forEach(p=>cctx.fillRect(p[0]-hs/2,p[1]-hs/2,hs,hs));
  cropCv.classList.remove('hidden');
}

let drag=null;
function evtToImg(e){const r=cropCv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;
  // object-fit:contain の余白（レターボックス）を考慮して実画像領域にマップ
  const car=cropCv.width/cropCv.height,ear=r.width/r.height;
  let cw,ch,ox,oy;
  if(car>ear){cw=r.width;ch=r.width/car;ox=r.left;oy=r.top+(r.height-ch)/2;}
  else{ch=r.height;cw=r.height*car;oy=r.top;ox=r.left+(r.width-cw)/2;}
  return{x:(t.clientX-ox)*cropCv.width/cw/kView,y:(t.clientY-oy)*cropCv.height/ch/kView};}   // srcCv座標で返す
function pointerDown(e){if(cropCv.classList.contains('hidden'))return;e.preventDefault();
  const p=evtToImg(e);
  if(pickMode){pickMode=false;pickBaseAt(p.x,p.y);return;}
  const hs=Math.max(16,cropCv.width*0.035)/kView;
  const C={tl:[crop.x,crop.y],tr:[crop.x+crop.w,crop.y],bl:[crop.x,crop.y+crop.h],br:[crop.x+crop.w,crop.y+crop.h]};
  if(format==='free'){C.t=[crop.x+crop.w/2,crop.y];C.b=[crop.x+crop.w/2,crop.y+crop.h];
    C.l=[crop.x,crop.y+crop.h/2];C.r=[crop.x+crop.w,crop.y+crop.h/2];}   // FREEは辺ドラッグ可
  for(const k in C){if(Math.abs(p.x-C[k][0])<hs&&Math.abs(p.y-C[k][1])<hs){drag={mode:k};return;}}
  if(p.x>crop.x&&p.x<crop.x+crop.w&&p.y>crop.y&&p.y<crop.y+crop.h){drag={mode:'move',p:p,ox:crop.x,oy:crop.y};}}
function pointerMove(e){if(!drag)return;e.preventDefault();const p=evtToImg(e);
  if(drag.mode==='move'){crop.x=clamp(drag.ox+(p.x-drag.p.x),0,srcCv.width-crop.w);
    crop.y=clamp(drag.oy+(p.y-drag.p.y),0,srcCv.height-crop.h);drawCrop();return;}
  if(drag.mode.length===1){                                   // 辺ドラッグ（FREEのみ）：一辺だけ動かす
    const W=srcCv.width,H=srcCv.height;
    if(drag.mode==='t'){const y=clamp(p.y,0,crop.y+crop.h-20);crop.h+=crop.y-y;crop.y=y;}
    else if(drag.mode==='b'){crop.h=clamp(p.y-crop.y,20,H-crop.y);}
    else if(drag.mode==='l'){const x=clamp(p.x,0,crop.x+crop.w-20);crop.w+=crop.x-x;crop.x=x;}
    else{crop.w=clamp(p.x-crop.x,20,W-crop.x);}
    drawCrop();return;}
  const A={tl:[crop.x+crop.w,crop.y+crop.h],tr:[crop.x,crop.y+crop.h],bl:[crop.x+crop.w,crop.y],br:[crop.x,crop.y]}[drag.mode];
  let w=Math.abs(p.x-A[0]),h=Math.abs(p.y-A[1]),x0,y0;
  if(format!=='free'){const a=curAspect();if(w/h>a){w=h*a;}else{h=w/a;}}
  x0=(drag.mode==='tl'||drag.mode==='bl')?A[0]-w:A[0];
  y0=(drag.mode==='tl'||drag.mode==='tr')?A[1]-h:A[1];
  w=Math.max(20,w);h=Math.max(20,h);
  crop.x=clamp(x0,0,srcCv.width-1);crop.y=clamp(y0,0,srcCv.height-1);
  crop.w=Math.min(w,srcCv.width-crop.x);crop.h=Math.min(h,srcCv.height-crop.y);drawCrop();}
function pointerUp(){drag=null;}

/* コマ内の明るい上位3%（＝未露光に最も近い部分）の中央値をベースにする */
function estimateBaseFromCrop(img){
  const d=img.data,n=d.length>>2;
  const lum=new Float32Array(n);
  for(let i=0,j=0;i<d.length;i+=4,j++)lum[j]=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
  const sorted=Float32Array.from(lum).sort();
  const th=sorted[Math.floor(n*0.97)];
  const S=[];
  for(let j=0;j<n;j++)if(lum[j]>=th){const i=j*4;S.push([d[i],d[i+1],d[i+2]]);}
  if(S.length<20)return null;
  const med=c=>{const a=S.map(p=>p[c]).sort((x,y)=>x-y);return a[a.length>>1];};
  return{r:med(0),g:med(1),b:med(2)};
}

function makeCropImageData(cap){
  const cw=Math.round(crop.w),ch=Math.round(crop.h);
  const W=srcCv.width,H=srcCv.height;
  // 原寸画像があれば、原寸の解像度まで拡大切り出しできる（縮小損失ゼロ）
  const k=origImg?((origRot%2?origImg.naturalHeight:origImg.naturalWidth)/W):1;
  const sc=Math.min(Math.max(1,k),cap/Math.max(cw,ch));
  const w=Math.max(1,Math.round(cw*sc)),h=Math.max(1,Math.round(ch*sc));
  const t=document.createElement('canvas');t.width=w;t.height=h;
  const tx=t.getContext('2d',{willReadFrequently:true});
  const paint=useOrig=>{
    tx.setTransform(1,0,0,1,0,0);tx.clearRect(0,0,w,h);
    tx.imageSmoothingEnabled=true;tx.imageSmoothingQuality='high';
    tx.scale(sc,sc);tx.translate(-crop.x,-crop.y);
    tx.translate(W/2,H/2);tx.rotate(tilt*Math.PI/180);tx.translate(-W/2,-H/2);  // 傾き補正込みで切り出し
    if(useOrig){
      tx.translate(W/2,H/2);tx.rotate(origRot*Math.PI/2);
      const W0=origRot%2?H:W,H0=origRot%2?W:H;
      tx.drawImage(origImg,-W0/2,-H0/2,W0,H0);                                   // 原寸から直接描画
    }else{tx.drawImage(srcCv,0,0);}
  };
  paint(!!origImg);
  let img=tx.getImageData(0,0,w,h);
  if(origImg){                                   // 原寸描画が空振りした場合（iOSのデコード失敗等）は内部コピーで再描画
    const d=img.data;let blank=true;
    for(let i=3;i<d.length;i+=4096){if(d[i]!==0){blank=false;break;}}
    if(blank){paint(false);img=tx.getImageData(0,0,w,h);}
  }
  return img;
}

/* モアレ・粒状軽減：3×3分離ボックスブラー×2回（≒ガウス σ1） */
function boxBlur(img){
  const w=img.width,h=img.height,s=img.data,t=new Uint8ClampedArray(s.length);
  for(let it=0;it<2;it++){
    for(let y=0;y<h;y++){const o=y*w*4;
      for(let x=0;x<w;x++){const i=o+x*4,l=o+Math.max(0,x-1)*4,r=o+Math.min(w-1,x+1)*4;
        t[i]=(s[l]+s[i]+s[r])/3;t[i+1]=(s[l+1]+s[i+1]+s[r+1])/3;t[i+2]=(s[l+2]+s[i+2]+s[r+2])/3;t[i+3]=255;}}
    for(let y=0;y<h;y++){const u=Math.max(0,y-1)*w*4,c=y*w*4,dn=Math.min(h-1,y+1)*w*4;
      for(let x=0;x<w;x++){const i=x*4;
        s[c+i]=(t[u+i]+t[c+i]+t[dn+i])/3;
        s[c+i+1]=(t[u+i+1]+t[c+i+1]+t[dn+i+1])/3;
        s[c+i+2]=(t[u+i+2]+t[c+i+2]+t[dn+i+2])/3;s[c+i+3]=255;}}
  }
  return img;
}

/* 反転：線形(255-x)ではなく濃度（log）領域で行う。
   ベースで正規化 → D=log2(base/v) を0〜DMAX段で0〜255にマップ。
   後段のチャンネル別レベル補正が、そのまま各感光層のガンマ差補正として効く */
const DMAX=4.5;
function makeLUT(){
  const mk=b=>{const a=new Uint8ClampedArray(256);b=Math.max(2,b);
    for(let v=0;v<256;v++){const D=Math.log2(b/Math.max(v,2));
      a[v]=255*clamp(D,0,DMAX)/DMAX;}return a;};
  const bl=baseColor.r*0.299+baseColor.g*0.587+baseColor.b*0.114;
  lut={r:mk(baseColor.r),g:mk(baseColor.g),b:mk(baseColor.b),l:mk(bl)};
}
function convert(img){
  if(!lut)makeLUT();
  const s=img.data,o=new ImageData(img.width,img.height),d=o.data;
  for(let i=0;i<s.length;i+=4){
    if(filmType==='color'){d[i]=lut.r[s[i]];d[i+1]=lut.g[s[i+1]];d[i+2]=lut.b[s[i+2]];}
    else if(filmType==='bw'){const l=(s[i]*0.299+s[i+1]*0.587+s[i+2]*0.114)|0;d[i]=d[i+1]=d[i+2]=lut.l[l];}
    else{d[i]=s[i];d[i+1]=s[i+1];d[i+2]=s[i+2];}
    d[i+3]=255;}
  return o;
}
function autoLevels(){if(!devSrc)return;
  const img=convert(devSrc),d=img.data,bins=[new Uint32Array(256),new Uint32Array(256),new Uint32Array(256)];
  for(let i=0;i<d.length;i+=4){bins[0][d[i]]++;bins[1][d[i+1]]++;bins[2][d[i+2]]++;}
  const tot=d.length/4,loN=tot*0.008,hiN=tot*0.008;lvls=[];
  for(let c=0;c<3;c++){let a=0,lo=0,hi=255;
    for(let v=0;v<256;v++){a+=bins[c][v];if(a>=loN){lo=v;break;}}
    a=0;for(let v=255;v>=0;v--){a+=bins[c][v];if(a>=hiN){hi=v;break;}}
    if(hi<=lo)hi=lo+1;lvls.push([lo,hi]);}
  // 退化ガード：ほぼ単色（描画失敗など）ならレベル補正で潰さない
  if(lvls.every(L=>L[1]-L[0]<6)){lvls=null;wb={r:1,g:1,b:1};flash('⚠ 画像が読めていない可能性');renderDev();return;}
  // オートWB（グレーワールド改）: 高彩度画素と白飛び・黒潰れを除外して平均（夕焼け・緑一面で外しにくく）
  const L=lvls,px=(i,c)=>cl((d[i+c]-L[c][0])*255/(L[c][1]-L[c][0]));
  let sr=0,sg=0,sb=0,n=0;
  for(let i=0;i<d.length;i+=4){
    const r=px(i,0),g=px(i,1),b=px(i,2);
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
    if(mx-mn<90&&mx>25&&mx<235){sr+=r;sg+=g;sb+=b;n++;}}
  if(n<tot*0.05){sr=sg=sb=0;n=tot;
    for(let i=0;i<d.length;i+=4){sr+=px(i,0);sg+=px(i,1);sb+=px(i,2);}}
  const mr=sr/n,mg=sg/n,mb=sb/n,gray=(mr+mg+mb)/3;
  const gain=m=>{let x=clamp(gray/Math.max(1,m),0.7,1.4);return 1+(x-1)*0.85;};
  wb={r:gain(mr),g:gain(mg),b:gain(mb)};
  renderDev();
}
$('#btnAutoLv').onclick=()=>{resetDev();lvls=null;autoLevels();flash('自動補正 ✓');};   // 一番見やすい状態へ一発補正

/* log反転そのままだと眠いので、緩いS字トーンをデフォルト適用（ネガ/モノクロのみ） */
const scLUT=new Uint8ClampedArray(256);
{const a=0.34;for(let v=0;v<256;v++){const x=v/255,y=x*x*(3-2*x);scLUT[v]=255*((1-a)*x+a*y);}}

function pipeline(img){
  const d=img.data;
  if(lvls)for(let c=0;c<3;c++){const lo=lvls[c][0],hi=lvls[c][1],s=255/(hi-lo);
    for(let i=c;i<d.length;i+=4)d[i]=cl((d[i]-lo)*s);}
  const exp=basic.exp*1.4,con=(basic.con/100)*0.9+1,sat=basic.sat/100,tcurve=filmType!=='slide';
  for(let i=0;i<d.length;i+=4){
    let r=cl(d[i]*wb.r),g=cl(d[i+1]*wb.g),b=cl(d[i+2]*wb.b);
    if(tcurve){r=scLUT[r|0];g=scLUT[g|0];b=scLUT[b|0];}
    const Y=(0.299*r+0.587*g+0.114*b)/255;
    const wS=Math.max(0,1-Y/0.5),wH=Math.max(0,(Y-0.5)/0.5),wM=1-Math.abs(Y-0.5)/0.5;
    r+=(cb.sh.cr*wS+cb.mid.cr*wM+cb.hi.cr*wH)*0.6;
    g+=(cb.sh.mg*wS+cb.mid.mg*wM+cb.hi.mg*wH)*0.6;
    b+=(cb.sh.yb*wS+cb.mid.yb*wM+cb.hi.yb*wH)*0.6;
    const tv=(tone.sh*wS+tone.mid*wM+tone.hi*wH)*0.9;   // ゾーン別の明るさ（簡易トーンカーブ）
    r+=tv+exp;g+=tv+exp;b+=tv+exp;
    r=(r-128)*con+128;g=(g-128)*con+128;b=(b-128)*con+128;
    if(sat){const l=r*0.299+g*0.587+b*0.114;r=l+(r-l)*(1+sat);g=l+(g-l)*(1+sat);b=l+(b-l)*(1+sat);}
    d[i]=cl(r);d[i+1]=cl(g);d[i+2]=cl(b);}
  return img;
}
/* アンシャープマスク：ボケ画像との差分を強調 */
function unsharp(img,amt){
  const c=new ImageData(new Uint8ClampedArray(img.data),img.width,img.height);
  boxBlur(c);
  const k=amt/100*1.5,s=img.data,b=c.data;
  for(let i=0;i<s.length;i+=4){
    s[i]=cl(s[i]+k*(s[i]-b[i]));
    s[i+1]=cl(s[i+1]+k*(s[i+1]-b[i+1]));
    s[i+2]=cl(s[i+2]+k*(s[i+2]-b[i+2]));}
  return img;
}
function renderDev(){if(!devSrc)return;
  const img=pipeline(convert(devSrc));
  if(basic.shp>0)unsharp(img,basic.shp);
  devCv.width=img.width;devCv.height=img.height;dctx.putImageData(img,0,0);
  devCv.classList.remove('hidden');
}

/* 保存：iOSは共有シート経由で「写真に保存」→ アルバム直保存。非対応時はダウンロード */
function dataURLtoBlob(u){const p=u.split(','),mime=p[0].match(/:(.*?);/)[1],bin=atob(p[1]),n=bin.length,a=new Uint8Array(n);
  for(let i=0;i<n;i++)a[i]=bin.charCodeAt(i);return new Blob([a],{type:mime});}
$('#btnSave').onclick=async()=>{
  const name='N16_'+Date.now()+'.jpg';
  const full=makeCropImageData(4032);if(nr)boxBlur(full); // 保存時はフル解像度で再現像
  const img=pipeline(convert(full));
  if(basic.shp>0)unsharp(img,basic.shp);
  const t=document.createElement('canvas');t.width=img.width;t.height=img.height;
  t.getContext('2d').putImageData(img,0,0);
  const blob=dataURLtoBlob(t.toDataURL('image/jpeg',0.93));
  const file=new File([blob],name,{type:'image/jpeg'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file]});}catch(e){}
    return;
  }
  const a=document.createElement('a');a.download=name;a.href=URL.createObjectURL(blob);a.click();
};

function goStage(s){
  $('#uiLoad').classList.toggle('hidden',s!=='load');
  $('#uiCrop').classList.toggle('hidden',s!=='crop');
  $('#uiDev').classList.toggle('hidden',s!=='dev');
  cropCv.classList.toggle('hidden',s!=='crop');
  devCv.classList.toggle('hidden',s!=='dev');
  hint.classList.toggle('hidden',s!=='load');
  $('#stepLabel').textContent={load:'① スキャン',crop:'② 切り抜き',dev:'③ 現像'}[s];
  badge.classList.add('hidden');
  stage.classList.toggle('compact',s!=='load');
  stage.classList.toggle('hidden',s==='load');            // 読み込み画面はロゴ表示
  $('#hero').classList.toggle('hidden',s!=='load');
}
function flash(t){badge.textContent=t;badge.classList.remove('hidden');clearTimeout(flash._t);
  flash._t=setTimeout(()=>badge.classList.add('hidden'),1200);}
function cl(v){return v<0?0:v>255?255:v;}
function clamp(v,a,b){return v<a?a:v>b?b:v;}

$('.logo').onclick=()=>{pickMode=false;goStage('load');resetCamUI();};   // ロゴタップでホームへ
window.onerror=(m,s,l)=>{try{flash('⚠ エラー: '+m+' L'+l);}catch(e){}};   // ベータ用：例外を可視化
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
